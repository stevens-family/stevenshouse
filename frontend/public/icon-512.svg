<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="borderGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C6A85A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E0C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C6A85A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0B0C0F"/>
  
  <!-- Gold border -->
  <rect x="20" y="20" width="472" height="472" rx="85" fill="none" stroke="url(#borderGrad512)" stroke-width="6"/>
  
  <!-- Inner dark -->
  <rect x="40" y="40" width="432" height="432" rx="75" fill="#111318"/>
  
  <!-- S Letter -->
  <text x="140" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="240" font-weight="800" fill="#F5F5F5">S</text>
  
  <!-- F Letter in gold -->
  <text x="265" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="240" font-weight="800" fill="#C6A85A">F</text>
  
  <!-- Accent line -->
  <line x1="100" y1="385" x2="235" y2="385" stroke="#C6A85A" stroke-width="10" stroke-linecap="round"/>
</svg>