<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C6A85A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E0C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C6A85A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0B0C0F"/>
  
  <!-- Gold border -->
  <rect x="8" y="8" width="176" height="176" rx="32" fill="none" stroke="url(#borderGrad)" stroke-width="3"/>
  
  <!-- Inner dark -->
  <rect x="16" y="16" width="160" height="160" rx="28" fill="#111318"/>
  
  <!-- S Letter -->
  <text x="54" y="128" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="90" font-weight="800" fill="#F5F5F5">S</text>
  
  <!-- F Letter in gold -->
  <text x="100" y="128" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="90" font-weight="800" fill="#C6A85A">F</text>
  
  <!-- Accent line -->
  <line x1="40" y1="145" x2="90" y2="145" stroke="#C6A85A" stroke-width="4" stroke-linecap="round"/>
</svg>